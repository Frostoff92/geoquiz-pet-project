apiVersion: apps/v1
kind: Deployment

metadata:
  name: geoquiz-api

spec:
  replicas: 1

  selector:
    matchLabels:
      app: geoquiz-api

  template:
    metadata:
      labels:
        app: geoquiz-api

    spec:
      containers:
        - name: geoquiz-api
          image: geoquiz-api:v1
          imagePullPolicy: Never

          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: geoquiz-config
            - secretRef:
                name: geoquiz-secret

          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10


          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5

