services:
  geoquiz-api:
    build: .
    container_name: geoquiz-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://geoquiz:geoquizpassword@postgres:5432/geoquizdb
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:17
    container_name: geoquiz-postgres

    environment:
      POSTGRES_USER: geoquiz
      POSTGRES_PASSWORD: geoquizpassword
      POSTGRES_DB: geoquizdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoquiz -d geoquizdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    container_name: geoquiz-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      geoquiz-api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: geoquiz-grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:

  
      