name: GeoQuiz CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    docker-build-and-smoke-test:
        runs-on: ubuntu-24.04

        services:
          postgres:
            image: postgres:17
            env:
              POSTGRES_USER: geoquiz
              POSTGRES_PASSWORD: geoquizpassword
              POSTGRES_DB: geoquizdb
            ports:
              - 5432:5432
            options: >-
              --health-cmd "pg_isready -U geoquiz -d geoquizdb"
              --health-interval 10s
              --health-timeout 5s
              --health-retries 5

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.13"

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Init Database
              run: python -m app.init_db

            - name: Seed Database
              run: python -m app.seed
            - name: Run tests
              run: python -m pytest

            - name: Build Docker image
              run: docker build -t geoquiz-api:ci .

            - name: Run container
              run: docker run -d -p 8000:8000 --name geoquiz-api geoquiz-api:ci

            - name: Smoke test health endpoint
              run: |
                sleep 5
                docker logs geoquiz-api
                curl --fail http://localhost:8000/