name: GeoQuiz CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    docker-build-and-smoke-test:
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Build Docker image
              run: docker build -t geoquiz-api:ci .

            - name: Run container
              run: docker run -d -p 8000:8000 --name geoquiz-api geoquiz-api:ci

            - name: Smoke test health endpoint
              run: |
                sleep 5
                docker logs geoquiz-api
                curl --fail http://localhost:8000/